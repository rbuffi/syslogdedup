<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firewall rules</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --port-bg: #21262d;
      --group-header: #238636;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem 1.5rem;
      min-height: 100vh;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .page-header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    .header-actions { display: flex; align-items: center; gap: 0.5rem; }
    #logoutBtn, #loginBtn { text-decoration: none; }
    .filters {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .filters label { display: flex; align-items: center; gap: 0.5rem; }
    .filters select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      min-width: 160px;
    }
    .filters select:focus { outline: none; border-color: var(--accent); }
    .loading, .error { margin: 1rem 0; }
    .error { color: #f85149; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th, td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--port-bg);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
    }
    tr.group-header td {
      background: rgba(35, 134, 54, 0.15);
      font-weight: 600;
      border-top: 2px solid var(--group-header);
    }
    tr.group-header td:first-child { padding-left: 1rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover:not(.group-header) td { background: rgba(88, 166, 255, 0.06); }
    .port-link {
      display: inline-block;
      background: var(--port-bg);
      color: var(--accent);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-decoration: none;
      font-variant-numeric: tabular-nums;
      border: 1px solid var(--border);
    }
    .port-link:hover {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent-hover);
      border-color: var(--accent);
    }
    .port-link:focus { outline: none; }
    .hint { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      max-width: 520px;
      width: 100%;
      padding: 1rem 1.25rem 1.1rem;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.65);
      color: var(--text);
    }
    .modal h2 {
      margin: 0 0 0.5rem;
      font-size: 1.05rem;
    }
    .modal .subheading {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .modal-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem 0.9rem;
      margin-top: 0.25rem;
    }
    .modal-form label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .modal-form select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .modal-form select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .modal-form .full-width {
      grid-column: 1 / -1;
    }
    .inline-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .inline-row select {
      flex: 1 1 auto;
      min-width: 0;
    }
    .service-details {
      margin: 0;
      padding: 0.55rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--port-bg);
      color: var(--text);
      font-size: 0.8rem;
      line-height: 1.35;
      min-height: 4.6rem;
      max-height: 11rem;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.9rem;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .button-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .btn {
      border-radius: 6px;
      border: 1px solid var(--border);
      padding: 0.35rem 0.85rem;
      font-size: 0.85rem;
      cursor: pointer;
      background: var(--port-bg);
      color: var(--text);
    }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0b1020;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .btn-ghost {
      background: transparent;
    }
    .modal-status {
      font-size: 0.8rem;
    }
    .modal-status.error {
      color: #f85149;
    }
    .modal-status.ok {
      color: var(--muted);
    }
    @media (max-width: 640px) {
      .modal {
        max-width: 100%;
        margin: 0 0.75rem;
      }
      .modal-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>Firewall rules</h1>
    <div class="header-actions">
      <a id="loginBtn" href="#" class="btn btn-primary" style="display: none;" role="button">Log in</a>
      <a id="logoutBtn" href="#" class="btn btn-ghost" style="display: none;" role="button">Logout</a>
    </div>
  </header>
  <p id="loginHint" class="hint" style="display: none;">Log in om firewallgegevens te bekijken.</p>
  <div class="filters">
    <label>
      Source group
      <select id="sourceGroup">
        <option value="">All</option>
      </select>
    </label>
    <label>
      Dest group
      <select id="destGroup">
        <option value="">All</option>
      </select>
    </label>
    <label>
      Src IP
      <input id="srcIpFilter" type="text" placeholder="contains…" />
    </label>
    <label>
      Dest IP
      <input id="destIpFilter" type="text" placeholder="contains…" />
    </label>
    <label>
      Port
      <input id="portFilter" type="text" placeholder="e.g. 443" />
    </label>
    <label>
      Protocol
      <select id="protocolFilter" multiple size="4">
      </select>
    </label>
    <label>
      Result
      <select id="resultFilter">
        <option value="">All</option>
        <option value="pass" selected>pass</option>
        <option value="drop">drop</option>
      </select>
    </label>
    <label>
      From
      <select id="hoursSelect">
        <option value="0" selected>All time</option>
        <option value="1">Last 1 hour</option>
        <option value="4">Last 4 hours</option>
        <option value="24">Last 24 hours</option>
        <option value="168">Last 7 days</option>
      </select>
    </label>
  </div>
  <div id="loading" class="loading" style="display: none;">Loading…</div>
  <div id="error" class="error" style="display: none;"></div>
  <div id="tableWrap"></div>
  <div id="detailsWrap" class="hint"></div>
  <p class="hint">Click a port to open NSX-T rule creation for that source/destination pair.</p>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="ruleModalTitle">
      <h2 id="ruleModalTitle">Create NSX-T firewall rule</h2>
      <p class="subheading" id="ruleModalContext"></p>
      <div class="modal-form">
        <label>
          Source group
          <select id="ruleSourceGroup"></select>
        </label>
        <label>
          Destination group
          <select id="ruleDestGroup"></select>
        </label>
        <label>
          Policy
          <select id="rulePolicy"></select>
        </label>
        <label>
          Direction
          <select id="ruleDirection">
            <option value="in">in</option>
            <option value="out">out</option>
            <option value="in/out">in/out</option>
          </select>
        </label>
        <label>
          IP Protocol
          <select id="ruleIpProtocol">
            <option value="IPV4" selected>IPV4</option>
            <option value="IPV6">IPV6</option>
            <option value="IPV4_IPV6">IPV4_IPV6</option>
          </select>
        </label>
        <label>
          L4 Protocol
          <input id="ruleL4Protocol" type="text" value="—" readonly />
        </label>
        <label>
          Service
          <div class="inline-row">
            <select id="ruleService"></select>
            <button type="button" class="btn btn-ghost" id="ruleRefreshServicesBtn">Ververs services</button>
          </div>
        </label>
        <label class="full-width">
          Service details
          <pre id="ruleServiceDetails" class="service-details">No service selected.</pre>
        </label>
        <label>
          Comment
          <input id="ruleComment" type="text" placeholder="Why this rule is needed…" />
        </label>
      </div>
      <div class="modal-footer">
        <div id="ruleStatus" class="modal-status ok"></div>
        <div class="button-row">
          <button type="button" class="btn btn-ghost" id="ruleCancelBtn">Cancel</button>
          <button type="button" class="btn btn-primary" id="ruleSubmitBtn">Create rule (disabled)</button>
        </div>
      </div>
      <div id="ruleError" class="modal-status error" style="display:none;"></div>
    </div>
  </div>

  <script>
    const BASE = (typeof window.__BASE_PATH__ === 'string' ? window.__BASE_PATH__ : '').replace(/\/$/, '');
    function appUrl(path) {
      if (!path.startsWith('/')) path = '/' + path;
      return BASE ? (BASE + path) : path;
    }

    const sourceSelect = document.getElementById('sourceGroup');
    const destSelect = document.getElementById('destGroup');
    const hoursSelect = document.getElementById('hoursSelect');
    const srcIpFilter = document.getElementById('srcIpFilter');
    const destIpFilter = document.getElementById('destIpFilter');
    const portFilter = document.getElementById('portFilter');
    const protocolFilter = document.getElementById('protocolFilter');
    const resultFilter = document.getElementById('resultFilter');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const tableWrap = document.getElementById('tableWrap');
    const detailsWrap = document.getElementById('detailsWrap');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const ruleModalContext = document.getElementById('ruleModalContext');
    const ruleSourceGroup = document.getElementById('ruleSourceGroup');
    const ruleDestGroup = document.getElementById('ruleDestGroup');
    const rulePolicy = document.getElementById('rulePolicy');
    const ruleDirection = document.getElementById('ruleDirection');
    const ruleIpProtocol = document.getElementById('ruleIpProtocol');
    const ruleL4Protocol = document.getElementById('ruleL4Protocol');
    const ruleService = document.getElementById('ruleService');
    const ruleRefreshServicesBtn = document.getElementById('ruleRefreshServicesBtn');
    const ruleServiceDetails = document.getElementById('ruleServiceDetails');
    const ruleComment = document.getElementById('ruleComment');
    const ruleStatus = document.getElementById('ruleStatus');
    const ruleError = document.getElementById('ruleError');
    const ruleCancelBtn = document.getElementById('ruleCancelBtn');
    const ruleSubmitBtn = document.getElementById('ruleSubmitBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginHint = document.getElementById('loginHint');
    if (loginBtn) loginBtn.href = appUrl('/auth/login');
    if (logoutBtn) logoutBtn.href = appUrl('/auth/logout');

    /** Set after /api/auth/status: OIDC off → data allowed; OIDC on → need session. */
    let authState = { oidcEnabled: false, authenticated: true };

    function requireAuthForData() {
      return !authState.oidcEnabled || authState.authenticated;
    }

    let allSourceGroups = [];
    let allDestGroups = [];
    let cachedPolicies = null;
    let cachedServices = null;
    let ruleContext = null;
    let ruleServicesForModal = [];

    function showLoading(show) {
      loadingEl.style.display = show ? 'block' : 'none';
      if (show) errorEl.style.display = 'none';
    }
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      tableWrap.innerHTML = '';
      detailsWrap.innerHTML = '';
    }
    function clearError() {
      errorEl.style.display = 'none';
    }

    async function fetchGroupsForModal(srcIp, destIp) {
      const s = (srcIp || '').trim();
      const d = (destIp || '').trim();
      const out = { source_groups: [], dest_groups: [] };
      if (s) {
        const r = await fetch(appUrl('/api/groups') + '?' + new URLSearchParams({ src_ip: s }));
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();
        out.source_groups = data.source_groups || [];
      }
      if (d) {
        const r = await fetch(appUrl('/api/groups') + '?' + new URLSearchParams({ dest_ip: d }));
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();
        out.dest_groups = data.dest_groups || [];
      }
      return out;
    }

    async function loadGroups() {
      if (!requireAuthForData()) {
        tableWrap.innerHTML = '<p class="hint">Log in om groepen en regels te laden.</p>';
        sourceSelect.innerHTML = '<option value="">All</option>';
        destSelect.innerHTML = '<option value="">All</option>';
        return;
      }
      try {
        const currentSource = sourceSelect.value;
        const currentDest = destSelect.value;
        const srcIp = srcIpFilter.value.trim();
        const destIp = destIpFilter.value.trim();
        const params = new URLSearchParams();
        if (srcIp) params.set('src_ip', srcIp);
        if (destIp) params.set('dest_ip', destIp);
        const suffix = params.toString();
        const r = await fetch(appUrl('/api/groups') + (suffix ? ('?' + suffix) : ''));
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();
        const sg = data.source_groups || [];
        const dg = data.dest_groups || [];
        allSourceGroups = sg.slice();
        allDestGroups = dg.slice();
        sourceSelect.innerHTML = '<option value="">All</option>' + sg.map(g => `<option value="${escapeAttr(g)}">${escapeHtml(g)}</option>`).join('');
        destSelect.innerHTML = '<option value="">All</option>' + dg.map(g => `<option value="${escapeAttr(g)}">${escapeHtml(g)}</option>`).join('');
        if (currentSource && sg.includes(currentSource)) {
          sourceSelect.value = currentSource;
        }
        if (currentDest && dg.includes(currentDest)) {
          destSelect.value = currentDest;
        }
      } catch (e) {
        showError('Failed to load groups: ' + e.message);
      }
    }

    async function loadProtocols() {
      if (!requireAuthForData()) {
        protocolFilter.innerHTML = '';
        return;
      }
      try {
        const currentProtocols = new Set(Array.from(protocolFilter.selectedOptions).map(o => o.value));
        const r = await fetch(appUrl('/api/protocols'));
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();
        const protocols = Array.isArray(data.protocols) ? data.protocols : [];
        protocolFilter.innerHTML = protocols
          .map(p => `<option value="${escapeAttr(p)}">${escapeHtml(p)}</option>`)
          .join('');

        // Default selection: TCP + UDP (when present), unless user already selected values.
        const hasExisting = currentProtocols.size > 0;
        const defaultSelected = new Set(['TCP', 'UDP']);
        Array.from(protocolFilter.options).forEach(opt => {
          if (hasExisting) {
            opt.selected = currentProtocols.has(opt.value);
          } else {
            opt.selected = defaultSelected.has(opt.value);
          }
        });
      } catch (e) {
        showError('Failed to load protocols: ' + e.message);
      }
    }

    function getSelectedProtocols() {
      return Array.from(protocolFilter.selectedOptions)
        .map(o => (o.value || '').trim().toUpperCase())
        .filter(Boolean);
    }

    function hasAnyProtocolSelected() {
      return getSelectedProtocols().length > 0;
    }

    function buildProtocolsParam() {
      const selected = getSelectedProtocols();
      return selected.join(',');
    }

    function getSelectedResult() {
      return (resultFilter.value || '').trim().toLowerCase();
    }

    function ensureDefaultProtocolSelectionIfEmpty() {
      if (hasAnyProtocolSelected()) return;
      const defaults = new Set(['TCP', 'UDP']);
      Array.from(protocolFilter.options).forEach(opt => {
        opt.selected = defaults.has(opt.value);
      });
    }

    function onProtocolFilterChange() {
      // Keep at least TCP+UDP selected by default behavior if user clears all.
      ensureDefaultProtocolSelectionIfEmpty();
      loadRules();
    }

    async function loadRules() {
      if (!requireAuthForData()) {
        tableWrap.innerHTML = '<p class="hint">Log in om firewallgegevens te bekijken.</p>';
        detailsWrap.innerHTML = '';
        return;
      }
      const sourceGroup = sourceSelect.value.trim();
      const destGroup = destSelect.value.trim();
      const hours = parseInt(hoursSelect.value || '0', 10) || 0;
      const srcIp = srcIpFilter.value.trim();
      const destIp = destIpFilter.value.trim();
      const port = portFilter.value.trim();
      const protocolsParam = buildProtocolsParam();
      const result = getSelectedResult();
      // Require at least some filter to avoid huge unbounded queries
      if (!sourceGroup && !destGroup && hours === 0 && !srcIp && !destIp && !port && !protocolsParam && !result) {
        tableWrap.innerHTML = '<p class="hint">Select a group, IP, port, or time window, then adjust filters to load data.</p>';
        detailsWrap.innerHTML = '';
        return;
      }
      showLoading(true);
      clearError();
      detailsWrap.innerHTML = '';
      try {
        const params = new URLSearchParams();
        if (sourceGroup) params.set('source_group', sourceGroup);
        if (destGroup) params.set('dest_group', destGroup);
        if (hours > 0) params.set('hours', String(hours));
        if (srcIp) params.set('src_ip', srcIp);
        if (destIp) params.set('dest_ip', destIp);
        if (port) params.set('dest_port', port);
        if (protocolsParam) params.set('protocols', protocolsParam);
        if (result) params.set('result', result);
        const r = await fetch(appUrl('/api/rules/grouped') + '?' + params.toString());
        if (!r.ok) throw new Error(r.statusText);
        const rows = await r.json();
        renderGroupedTable(rows);
        }
      catch (e) {
        showError('Failed to load rules: ' + e.message);
      } finally {
        showLoading(false);
      }
    }
    function parseJsonArray(raw) {
      try {
        const parsed = JSON.parse(raw || '[]');
        return Array.isArray(parsed) ? parsed.filter(v => typeof v === 'string' && v.trim()) : [];
      } catch (_) {
        return [];
      }
    }
    function uniqueNonEmpty(items) {
      const out = [];
      const seen = new Set();
      for (const item of (items || [])) {
        const value = String(item || '').trim();
        if (!value || seen.has(value)) continue;
        seen.add(value);
        out.push(value);
      }
      return out;
    }

    function servicePortMatches(rulePort, servicePortEntry) {
      const rulePortStr = String(rulePort || '').trim();
      const entry = String(servicePortEntry || '').trim();
      if (!rulePortStr || !entry) return false;
      if (entry === rulePortStr) return true;

      const ruleNum = Number.parseInt(rulePortStr, 10);
      if (!Number.isFinite(ruleNum)) return false;

      const rangeMatch = entry.match(/^(\d+)\s*-\s*(\d+)$/);
      if (!rangeMatch) return false;
      const start = Number.parseInt(rangeMatch[1], 10);
      const end = Number.parseInt(rangeMatch[2], 10);
      if (!Number.isFinite(start) || !Number.isFinite(end)) return false;
      const min = Math.min(start, end);
      const max = Math.max(start, end);
      return ruleNum >= min && ruleNum <= max;
    }

    function normalizeL4Protocol(raw) {
      const s = String(raw || '').trim().toUpperCase();
      if (!s) return '';
      if (s === '6' || s === 'IPV4_TCP') return 'TCP';
      if (s === '17' || s === 'IPV4_UDP') return 'UDP';
      return s;
    }

    function formatServicePortsSummary(service) {
      const entries = Array.isArray(service.service_entries) ? service.service_entries : [];
      if (entries.length) {
        const parts = [];
        for (const entry of entries) {
          const proto = normalizeL4Protocol(entry.l4_protocol) || 'ANY';
          const ports = Array.isArray(entry.destination_ports)
            ? entry.destination_ports.map(p => String(p).trim()).filter(Boolean)
            : [];
          const portText = ports.length ? ports.join(',') : 'any';
          parts.push(proto + ':' + portText);
        }
        const uniqueParts = Array.from(new Set(parts));
        if (uniqueParts.length) return uniqueParts.join('; ');
      }

      const ports = Array.isArray(service.ports)
        ? service.ports.map(p => String(p).trim()).filter(Boolean)
        : [];
      if (ports.length) return ports.join(',');
      return 'any';
    }

    function formatServiceDetails(service) {
      if (!service) return 'No service selected.';
      const lines = [];
      lines.push('Name: ' + (service.display || service.name || service.id || '—'));
      lines.push('ID: ' + (service.id || '—'));

      const entries = Array.isArray(service.service_entries) ? service.service_entries : [];
      if (entries.length) {
        lines.push('Entries:');
        entries.forEach((entry, idx) => {
          const proto = normalizeL4Protocol(entry.l4_protocol) || 'ANY';
          const ports = Array.isArray(entry.destination_ports)
            ? entry.destination_ports.map(p => String(p).trim()).filter(Boolean)
            : [];
          lines.push('  ' + (idx + 1) + '. ' + proto + ' -> ' + (ports.length ? ports.join(', ') : 'any'));
        });
        return lines.join('\n');
      }

      const proto = normalizeL4Protocol(service.protocol) || 'ANY';
      const ports = Array.isArray(service.ports)
        ? service.ports.map(p => String(p).trim()).filter(Boolean)
        : [];
      lines.push('Protocol: ' + proto);
      lines.push('Ports: ' + (ports.length ? ports.join(', ') : 'any'));
      return lines.join('\n');
    }

    function updateSelectedServiceDetails() {
      const selectedId = (ruleService.value || '').trim();
      if (!selectedId) {
        ruleServiceDetails.textContent = 'No service selected.';
        return;
      }
      const selectedService = ruleServicesForModal.find(s => (s.id || '') === selectedId) || null;
      ruleServiceDetails.textContent = formatServiceDetails(selectedService);
    }

    function setRuleStatusError(message) {
      ruleError.textContent = message;
      ruleError.style.display = 'block';
    }

    function clearRuleStatusError() {
      ruleError.style.display = 'none';
      ruleError.textContent = '';
    }

    function serviceEntryMatchesFlow(entry, portStr, flowProtoNorm) {
      const ports = entry.destination_ports;
      if (!Array.isArray(ports) || !ports.length) return false;
      const pMatch = ports.some(p => servicePortMatches(portStr, p));
      if (!pMatch) return false;
      const ep = normalizeL4Protocol(entry.l4_protocol);
      if (!ep || !flowProtoNorm) return true;
      return ep === flowProtoNorm;
    }

    function serviceMatchesFlowPort(s, portStr, protoUpper) {
      const flowProtoNorm = normalizeL4Protocol(protoUpper);
      const entries = s.service_entries;
      if (Array.isArray(entries) && entries.length) {
        return entries.some(e => serviceEntryMatchesFlow(e, portStr, flowProtoNorm));
      }
      if (!Array.isArray(s.ports) || !s.ports.length) return false;
      const pMatch = s.ports.some(p => servicePortMatches(portStr, p));
      if (!pMatch) return false;
      const svcProto = normalizeL4Protocol(s.protocol);
      if (!svcProto || !flowProtoNorm) return true;
      return svcProto === flowProtoNorm;
    }

    function escapeAttr(s) {
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function onPortClick(e) {
      e.preventDefault();
      const a = e.target.closest('a');
      if (!a) return;
      const port = a.dataset.port;
      const sourceGroup = a.dataset.sourceGroup || '';
      const destGroup = a.dataset.destGroup || '';
      const srcIp = a.dataset.srcIp || '';
      const destIp = a.dataset.destIp || '';
      const sourceGroups = parseJsonArray(a.dataset.sourceGroups);
      const destGroups = parseJsonArray(a.dataset.destGroups);
      const direction = a.dataset.direction || '';
      const protocol = a.dataset.protocol || '';
      ruleContext = { port, sourceGroup, destGroup, srcIp, destIp, sourceGroups, destGroups, direction, protocol };
      void openRuleModal();
    }

    function renderTable(rows, target) {
      const container = target || tableWrap;
      if (!rows.length) {
        container.innerHTML = '<p class="hint">No rules match the selected filters.</p>';
        return;
      }
      let lastSource = '';
      let lastDest = '';
      const trs = [];
      for (const row of rows) {
        const sg = row.source_group ?? '';
        const dg = row.dest_group ?? '';
        const isNewGroup = sg !== lastSource || dg !== lastDest;
        if (isNewGroup) {
          lastSource = sg;
          lastDest = dg;
          trs.push(
            '<tr class="group-header"><td colspan="8">' +
            escapeHtml(sg || '—') + ' → ' + escapeHtml(dg || '—') +
            '</td></tr>'
          );
        }
        const port = row.dest_port != null ? row.dest_port : '—';
        const portCell = port !== '—'
          ? '<a href="#" class="port-link" data-port="' + escapeAttr(port) + '" data-source-group="' + escapeAttr(sg) + '" data-dest-group="' + escapeAttr(dg) + '" data-source-groups="' + escapeAttr(JSON.stringify(Array.isArray(row.source_groups) ? row.source_groups : [])) + '" data-dest-groups="' + escapeAttr(JSON.stringify(Array.isArray(row.dest_groups) ? row.dest_groups : [])) + '" data-src-ip="' + escapeAttr(row.src_ip ?? '') + '" data-dest-ip="' + escapeAttr(row.dest_ip ?? '') + '" data-direction="' + escapeAttr(row.direction ?? '') + '" data-protocol="' + escapeAttr(row.protocol ?? '') + '">' + escapeHtml(String(port)) + '</a>'
          : '—';
        trs.push(
          '<tr>' +
          '<td>' + escapeHtml(sg) + '</td>' +
          '<td>' + escapeHtml(dg) + '</td>' +
          '<td>' + portCell + '</td>' +
          '<td>' + escapeHtml(row.src_ip ?? '') + '</td>' +
          '<td>' + escapeHtml(row.dest_ip ?? '') + '</td>' +
          '<td>' + escapeHtml(row.direction ?? '') + '</td>' +
          '<td>' + escapeHtml(row.result ?? '') + '</td>' +
          '<td>' + escapeHtml(String(row.hit_count ?? '')) + '</td>' +
          '</tr>'
        );
      }
      container.innerHTML =
        '<table><thead><tr>' +
        '<th>Source group</th><th>Dest group</th><th>Dest port</th>' +
        '<th>Src IP</th><th>Dest IP</th><th>Direction</th><th>Result</th><th>Hit count</th>' +
        '</tr></thead><tbody>' + trs.join('') + '</tbody></table>';
      container.querySelectorAll('.port-link').forEach(el => el.addEventListener('click', onPortClick));
    }

    async function ensurePoliciesLoaded() {
      if (cachedPolicies) return cachedPolicies;
      try {
        const r = await fetch(appUrl('/api/nsx/policies'));
        if (!r.ok) throw new Error(r.statusText);
        cachedPolicies = await r.json();
      } catch (e) {
        throw new Error('Failed to load NSX-T policies: ' + e.message);
      }
      return cachedPolicies;
    }

    async function ensureServicesLoaded() {
      if (cachedServices) return cachedServices;
      try {
        const r = await fetch(appUrl('/api/nsx/services'));
        if (!r.ok) throw new Error(r.statusText);
        cachedServices = await r.json();
      } catch (e) {
        throw new Error('Failed to load NSX-T services: ' + e.message);
      }
      return cachedServices;
    }

    function renderServicesForModal(services, opts) {
      const options = opts || {};
      const preserveSelection = !!options.preserveSelection;
      const preferredServiceId = preserveSelection ? (ruleService.value || '').trim() : '';
      if (!Array.isArray(services) || !services.length) {
        ruleService.innerHTML = '<option value="">No services found</option>';
        ruleServicesForModal = [];
        ruleServiceDetails.textContent = 'No services found.';
        return;
      }

      const portStr = ruleContext && ruleContext.port != null ? String(ruleContext.port).trim() : '';
      const proto = ruleContext ? (ruleContext.protocol || '').toUpperCase() : '';
      const usePortFilter = portStr !== '';
      let listToShow = services;
      if (usePortFilter) {
        listToShow = services.filter(s => serviceMatchesFlowPort(s, portStr, proto));
      }
      if (usePortFilter && !listToShow.length) {
        ruleService.innerHTML = '<option value="">none</option>';
        ruleServicesForModal = [];
        ruleServiceDetails.textContent = 'No matching services for this flow.';
        return;
      }

      ruleServicesForModal = listToShow;
      ruleService.innerHTML = listToShow
        .map(s => {
          const baseLabel = s.display || s.name || s.id;
          return '<option value="' + escapeAttr(s.id) + '">' + escapeHtml(baseLabel) + '</option>';
        })
        .join('');

      const hasPreferred = preferredServiceId && listToShow.some(s => (s.id || '') === preferredServiceId);
      if (hasPreferred) {
        ruleService.value = preferredServiceId;
      } else if (usePortFilter && listToShow.length) {
        ruleService.value = listToShow[0].id;
      }
      updateSelectedServiceDetails();
    }

    async function refreshServicesForModal(opts) {
      if (!ruleContext) return;
      const options = opts || {};
      const forceRefresh = !!options.forceRefresh;
      const preserveSelection = !!options.preserveSelection;
      if (forceRefresh) {
        cachedServices = null;
      }
      clearRuleStatusError();
      try {
        const services = await ensureServicesLoaded();
        renderServicesForModal(services, { preserveSelection });
      } catch (e) {
        ruleService.innerHTML = '<option value="">Failed to load services</option>';
        ruleServicesForModal = [];
        ruleServiceDetails.textContent = 'Failed to load service details.';
        setRuleStatusError(e.message);
      }
    }

    function renderGroupedTable(rows) {
      if (!rows.length) {
        tableWrap.innerHTML = '<p class="hint">No rules match the selected filters.</p>';
        detailsWrap.innerHTML = '';
        return;
      }
      const trs = [];
      for (const row of rows) {
        const sg = row.source_group ?? '';
        const dg = row.dest_group ?? '';
        const ports = Array.isArray(row.dest_ports) ? row.dest_ports : [];
        const portsSummary = ports.length === 0
          ? '—'
          : (ports.length <= 10
              ? ports.join(', ')
              : ports.slice(0, 10).join(', ') + `, +${ports.length - 10} more`);
        const hitCount = row.hit_count ?? '';
        const result = row.result ?? '';
        trs.push(
          '<tr>' +
          '<td>' + escapeHtml(sg) + '</td>' +
          '<td>' + escapeHtml(dg) + '</td>' +
          '<td>' + escapeHtml(portsSummary) + '</td>' +
          '<td>' + escapeHtml(result) + '</td>' +
          '<td>' + escapeHtml(String(hitCount)) + '</td>' +
          '<td><button type="button" class="btn btn-ghost" data-sg="' + escapeAttr(sg) + '" data-dg="' + escapeAttr(dg) + '">Details</button></td>' +
          '</tr>'
        );
      }
      tableWrap.innerHTML =
        '<table><thead><tr>' +
        '<th>Source group</th><th>Dest group</th><th>Dest ports</th>' +
        '<th>Result</th><th>Hit count</th><th></th>' +
        '</tr></thead><tbody>' + trs.join('') + '</tbody></table>';

      tableWrap.querySelectorAll('button[data-sg]').forEach(btn => {
        btn.addEventListener('click', () => {
          const sg = btn.getAttribute('data-sg') || '';
          const dg = btn.getAttribute('data-dg') || '';
          loadDetailsForPair(sg, dg);
        });
      });
    }

    async function loadDetailsForPair(sg, dg) {
      if (!requireAuthForData()) {
        showError('Log in om details te bekijken.');
        return;
      }
      const hours = parseInt(hoursSelect.value || '0', 10) || 0;
      const srcIp = srcIpFilter.value.trim();
      const destIp = destIpFilter.value.trim();
      const port = portFilter.value.trim();
      const protocolsParam = buildProtocolsParam();
      const result = getSelectedResult();
      showLoading(true);
      clearError();
      try {
        const params = new URLSearchParams();
        if (sg) params.set('source_group', sg);
        if (dg) params.set('dest_group', dg);
        if (hours > 0) params.set('hours', String(hours));
        if (srcIp) params.set('src_ip', srcIp);
        if (destIp) params.set('dest_ip', destIp);
        if (port) params.set('dest_port', port);
        if (protocolsParam) params.set('protocols', protocolsParam);
        if (result) params.set('result', result);
        const r = await fetch(appUrl('/api/rules') + '?' + params.toString());
        if (!r.ok) throw new Error(r.statusText);
        const rows = await r.json();
        detailsWrap.innerHTML = '<p class="hint">Details for ' + escapeHtml(sg || '—') + ' → ' + escapeHtml(dg || '—') + ' (max ' + rows.length + ' flows)</p>';
        renderTable(rows, detailsWrap);
      } catch (e) {
        showError('Failed to load details: ' + e.message);
      } finally {
        showLoading(false);
      }
    }

    async function openRuleModal() {
      if (!ruleContext) return;
      clearRuleStatusError();
      ruleStatus.textContent = 'Creating a disabled, logged rule in the Application section.';
      ruleStatus.classList.remove('error');
      ruleStatus.classList.add('ok');
      const sgText = ruleContext.sourceGroup || '—';
      const dgText = ruleContext.destGroup || '—';
      const portText = ruleContext.port || '—';
      const protocolText = normalizeL4Protocol(ruleContext.protocol) || '—';
      ruleModalContext.textContent =
        'Source: ' + sgText + '  →  Destination: ' + dgText + '  |  Port ' + portText + '  |  Protocol ' + protocolText;
      ruleL4Protocol.value = protocolText;

      ruleSourceGroup.innerHTML = '<option value="">Loading…</option>';
      ruleDestGroup.innerHTML = '<option value="">Loading…</option>';
      ruleDirection.value = (ruleContext.direction || '').toLowerCase() === 'out' ? 'out'
        : (ruleContext.direction || '').toLowerCase() === 'in/out' ? 'in/out'
        : 'in';
      // Default to IPV4 when creating a new rule
      ruleIpProtocol.value = 'IPV4';

      rulePolicy.innerHTML = '<option value="">Loading…</option>';
      ruleService.innerHTML = '<option value="">Loading…</option>';
      ruleRefreshServicesBtn.disabled = true;
      modalBackdrop.style.display = 'flex';

      // Strict behavior: only allow groups that belong to the clicked rule row.
      const modalSourceGroups = uniqueNonEmpty([]
        .concat(Array.isArray(ruleContext.sourceGroups) ? ruleContext.sourceGroups : [])
        .concat(ruleContext.sourceGroup || []));
      const modalDestGroups = uniqueNonEmpty([]
        .concat(Array.isArray(ruleContext.destGroups) ? ruleContext.destGroups : [])
        .concat(ruleContext.destGroup || []));

      const srcOptions = ['<option value="">(select)</option>']
        .concat(modalSourceGroups.map(g => '<option value="' + escapeAttr(g) + '">' + escapeHtml(g) + '</option>'));
      const destOptions = ['<option value="">(select)</option>']
        .concat(modalDestGroups.map(g => '<option value="' + escapeAttr(g) + '">' + escapeHtml(g) + '</option>'));
      ruleSourceGroup.innerHTML = srcOptions.join('');
      ruleDestGroup.innerHTML = destOptions.join('');
      if (ruleContext.sourceGroup && modalSourceGroups.includes(ruleContext.sourceGroup)) {
        ruleSourceGroup.value = ruleContext.sourceGroup;
      }
      if (ruleContext.destGroup && modalDestGroups.includes(ruleContext.destGroup)) {
        ruleDestGroup.value = ruleContext.destGroup;
      }

      ensurePoliciesLoaded()
        .then(policies => {
          if (!Array.isArray(policies) || !policies.length) {
            rulePolicy.innerHTML = '<option value="">No Application policies found</option>';
            return;
          }
          rulePolicy.innerHTML = policies
            .map(p => '<option value="' + escapeAttr(p.id) + '">' + escapeHtml(p.name) + '</option>')
            .join('');
        })
        .catch(e => {
          rulePolicy.innerHTML = '<option value="">Failed to load policies</option>';
          setRuleStatusError(e.message);
        });

      await refreshServicesForModal({ preserveSelection: false });
      ruleRefreshServicesBtn.disabled = false;
    }

    function closeRuleModal() {
      modalBackdrop.style.display = 'none';
      ruleContext = null;
    }

    async function submitRule() {
      if (!ruleContext) return;
      const sourceGroup = ruleSourceGroup.value.trim();
      const destGroup = ruleDestGroup.value.trim();
      const policyId = rulePolicy.value.trim();
      const direction = ruleDirection.value.trim();
      const serviceId = ruleService.value.trim();
      const comment = ruleComment.value.trim();

      clearRuleStatusError();

      if (!sourceGroup || !destGroup || !policyId || !direction || !serviceId) {
        setRuleStatusError('Source group, destination group, policy, direction, and service are required.');
        return;
      }

      ruleSubmitBtn.disabled = true;
      ruleStatus.textContent = 'Creating rule…';
      ruleStatus.classList.remove('error');
      ruleStatus.classList.add('ok');

      try {
        // Derive policy name from cached policies for label construction on backend
        let policyName = policyId;
        if (Array.isArray(cachedPolicies)) {
          const match = cachedPolicies.find(p => p.id === policyId);
          if (match) {
            policyName = match.name || policyName;
          }
        }
        const payload = {
          source_group: sourceGroup,
          dest_group: destGroup,
          policy_id: policyId,
          policy_name: policyName,
          direction: direction,
          service_id: serviceId,
          ip_protocol: ruleIpProtocol.value,
          port: ruleContext.port || null,
          protocol: ruleContext.protocol || null,
          comment: comment || null
        };
        const r = await fetch(appUrl('/api/nsx/rules'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!r.ok) {
          const text = await r.text();
          throw new Error(text || r.statusText);
        }
        ruleStatus.textContent = 'Rule created in NSX-T (disabled, logging enabled).';
        setTimeout(() => {
          closeRuleModal();
        }, 900);
      } catch (e) {
        ruleStatus.textContent = '';
        setRuleStatusError('Failed to create rule: ' + e.message);
      } finally {
        ruleSubmitBtn.disabled = false;
      }
    }

    sourceSelect.addEventListener('change', loadRules);
    destSelect.addEventListener('change', loadRules);
    hoursSelect.addEventListener('change', loadRules);
    srcIpFilter.addEventListener('change', async () => {
      await loadGroups();
      await loadRules();
    });
    destIpFilter.addEventListener('change', async () => {
      await loadGroups();
      await loadRules();
    });
    portFilter.addEventListener('change', loadRules);
    protocolFilter.addEventListener('change', onProtocolFilterChange);
    resultFilter.addEventListener('change', loadRules);
    ruleCancelBtn.addEventListener('click', closeRuleModal);
    ruleSubmitBtn.addEventListener('click', submitRule);
    ruleService.addEventListener('change', updateSelectedServiceDetails);
    ruleRefreshServicesBtn.addEventListener('click', async () => {
      if (!ruleContext) return;
      const previousStatusText = ruleStatus.textContent;
      const previousStatusIsOk = ruleStatus.classList.contains('ok');
      const previousStatusIsError = ruleStatus.classList.contains('error');
      ruleRefreshServicesBtn.disabled = true;
      ruleStatus.textContent = 'Refreshing services…';
      ruleStatus.classList.remove('error');
      ruleStatus.classList.add('ok');
      await refreshServicesForModal({ forceRefresh: true, preserveSelection: true });
      if (ruleError.style.display !== 'block') {
        ruleStatus.textContent = 'Services refreshed.';
      } else if (previousStatusText) {
        ruleStatus.textContent = previousStatusText;
        ruleStatus.classList.toggle('ok', previousStatusIsOk);
        ruleStatus.classList.toggle('error', previousStatusIsError);
      } else {
        ruleStatus.textContent = '';
      }
      ruleRefreshServicesBtn.disabled = false;
    });
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) {
        closeRuleModal();
      }
    });

    async function initAuthUi() {
      try {
        const r = await fetch(appUrl('/api/auth/status'));
        if (!r.ok) return;
        const data = await r.json();
        authState.oidcEnabled = !!data.oidc_enabled;
        authState.authenticated = !data.oidc_enabled || !!data.authenticated;
        if (data.oidc_enabled) {
          if (data.authenticated) {
            if (logoutBtn) logoutBtn.style.display = 'inline-block';
            if (loginBtn) loginBtn.style.display = 'none';
            if (loginHint) loginHint.style.display = 'none';
          } else {
            if (loginBtn) loginBtn.style.display = 'inline-block';
            if (logoutBtn) logoutBtn.style.display = 'none';
            if (loginHint) loginHint.style.display = 'block';
          }
        } else {
          if (loginBtn) loginBtn.style.display = 'none';
          if (logoutBtn) logoutBtn.style.display = 'none';
          if (loginHint) loginHint.style.display = 'none';
        }
      } catch (_) {
        /* ignore */
      }
    }

    (async function boot() {
      await initAuthUi();
      await loadGroups();
      await loadProtocols();
    })();
  </script>
</body>
</html>
