# Optional: enable TLS and set host to match OIDC_REDIRECT_URI base URL.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syslogdedup-web
  namespace: syslogdedup
  annotations:
    # Example for ingress-nginx:
    # nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - host: syslogdedup.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syslogdedup-web
                port:
                  number: 8080
  # tls:
  #   - hosts:
  #       - syslogdedup.example.com
  #     secretName: syslogdedup-web-tls
