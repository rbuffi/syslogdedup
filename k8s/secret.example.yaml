# Copy to secret.yaml (do not commit), fill stringData, then:
#   kubectl apply -f k8s/secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: syslogdedup-app
  namespace: syslogdedup
type: Opaque
stringData:
  # Used by Postgres StatefulSet and web Deployment
  postgres-password: "CHANGE_ME_STRONG_PASSWORD"
  # Optional — only if OIDC_ENABLED=true on web
  # oidc-client-secret: ""
  # oidc-session-secret: ""
  # Add this key when deploying k8s/syslog-deployment.yaml
  # nsxt-password: "your-nsxt-password"
