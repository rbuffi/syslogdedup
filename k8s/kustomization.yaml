# Usage:
#   1. cp k8s/secret.example.yaml k8s/secret.yaml  # fill postgres-password, apply
#   2. kubectl apply -f k8s/secret.yaml
#   3. kubectl apply -k k8s/
#
# Or without kustomize:
#   kubectl apply -f k8s/namespace.yaml -f k8s/configmap.yaml -f k8s/postgres.yaml ...
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: syslogdedup

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - web-deployment.yaml
  - web-service.yaml
  # Optional — after editing host/TLS and ingress class:
  # - web-ingress.yaml
  # Optional syslog receiver — uncomment after Secret key nsxt-password and image push:
  # - syslog-deployment.yaml
  # - syslog-service.yaml

# Uncomment to pin images from your registry:
# images:
#   - name: syslogdedup-web
#     newName: ghcr.io/yourorg/syslogdedup-web
#     newTag: "1.0.0"
